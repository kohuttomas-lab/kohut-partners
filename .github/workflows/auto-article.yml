name: Auto-generuj blog článok

# Vygeneruje SK+EN článok z prvej témy v marketing/article-topics.md a otvorí PR na schválenie.
# Beží automaticky (týždenne) aj ručne (workflow_dispatch).
# Vyžaduje repo secret ANTHROPIC_API_KEY.

on:
  schedule:
    - cron: "0 6 * * 1" # každý pondelok 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Inštalácia Anthropic SDK (mimo package.json)
        run: npm install --no-save --no-package-lock @anthropic-ai/sdk@latest

      - name: Generovanie článku
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-article.mjs

      - name: Otvor PR na schválenie
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto-article
          delete-branch: true
          commit-message: "Blog: AI-generovaný článok (na schválenie)"
          title: "Nový blog článok (AI návrh — na schválenie)"
          labels: |
            auto-article
            needs-review
          body: |
            Automaticky vygenerovaný blog článok cez Claude API (`scripts/generate-article.mjs`).

            ⚠️ **Pred mergom skontroluj:**
            - právnu presnosť (žiadne nesprávne tvrdenia / paragrafy),
            - tón a brand,
            - SK aj EN verziu.

            Ak je OK → **Merge** (nasadí sa cez Vercel). Ak nie → **Close** (tému netreba vracať, je už zaškrtnutá).
