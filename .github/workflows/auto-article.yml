name: Auto-generuj blog článok

# Vygeneruje SK+EN článok z prvej témy v marketing/article-topics.md a publikuje ho PRIAMO na main
# (auto-publish bez schvaľovania — zvolené userom 2026-07-13). Pred pushom beží typecheck ako poistka.
# Beží automaticky (týždenne) aj ručne (workflow_dispatch).
# Vyžaduje repo secret ANTHROPIC_API_KEY.

on:
  schedule:
    - cron: "0 6 * * 1" # každý pondelok 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Inštalácia závislostí (pre typecheck)
        run: npm ci

      # Bez --no-package-lock: inak npm ignoruje lockfile a preresolvuje celý strom
      # (naposledy povýšil 52 balíkov vrátane stripe → typecheck padol na apiVersion).
      - name: Inštalácia Anthropic SDK (mimo package.json)
        run: npm install --no-save @anthropic-ai/sdk@latest

      - name: Generovanie článku
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-article.mjs

      # PageProps/LayoutProps sú globály generované Nextom (.next/types + next-env.d.ts);
      # v čistom checkoute neexistujú, takže tsc bez typegenu padne.
      - name: Generovanie typov rout (pre tsc)
        run: npx next typegen

      - name: Typecheck — poistka pred publikovaním
        run: npx tsc --noEmit --incremental false

      - name: Publikuj priamo na main
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Žiadne zmeny (došli témy alebo duplicitný slug) — nepublikujem."
            exit 0
          fi
          # Autor musí byť člen Vercel tímu, inak Hobby plán deploy odmietne — nie bot identita
          git config user.name "Tomas Kohut"
          git config user.email "kohut.tomas@gmail.com"
          git commit -m "Blog: AI-generovaný článok (auto-publish)"
          git push
